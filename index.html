<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>By|Coffee</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        body {
            background-color: #050508;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .eclipse-bg {
            position: absolute;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, #000 40%, #ff2a2a 70%, transparent 100%);
            border-radius: 50%;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 0.35;
            filter: blur(10px);
            box-shadow: 0 0 80px #ff0000;
            animation: eclipsePulse 6s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes eclipsePulse {
            0% { transform: translateX(-50%) scale(1); opacity: 0.3; }
            100% { transform: translateX(-50%) scale(1.15); opacity: 0.5; }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #030305;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.6s ease, visibility 0.6s;
            font-size: 1.1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #ff2a2a;
            text-shadow: 0 0 8px #ff0000;
        }

        .profile-container {
            background: rgba(8, 8, 12, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 0, 0, 0.2);
            padding: 40px 30px;
            border-radius: 16px;
            width: 350px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
            z-index: 10;
            transform: scale(0.8) translateY(30px);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .loaded .profile-container {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .avatar-box {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff2a2a;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.35);
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 2px 2px #ff0000, -2px -2px #00f0ff;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 1px 1px #ff0000, -1px -1px #00f0ff; }
            50% { text-shadow: 2px -1px #ff0000, -1px 2px #00f0ff; }
            52% { text-shadow: -3px 2px #ff0000, 3px -2px #00f0ff; }
            100% { text-shadow: 1px 1px #ff0000, -1px -1px #00f0ff; }
        }

        .status {
            font-size: 0.85rem;
            color: #8c8c9e;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .badge-info {
            display: inline-block;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 14px;
            border-radius: 4px;
            margin: 4px;
            color: #b5b5c3;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-link {
            display: block;
            margin-top: 25px;
            padding: 14px;
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid #ff2a2a;
            border-radius: 6px;
            color: #ff4d4d;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 20;
            cursor: pointer;
        }

        .social-link:hover {
            background: #ff2a2a;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 42, 42, 0.5);
        }

        .music-player {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 16px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 20;
        }

        .track-info {
            text-align: left;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .track-title { font-weight: bold; color: #fff; }
        .track-artist { color: #6c6c7a; margin-top: 4px; }

        .play-btn {
            background: none;
            border: 1px solid #ff2a2a;
            color: #ff2a2a;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .play-btn:hover {
            background: rgba(255, 42, 42, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body id="body-wrapper">

    <div class="eclipse-bg"></div>
    <canvas id="particles"></canvas>

    <div id="overlay" onclick="revealProfile()">[ ENTER THE ECLIPSE ]</div>

    <div class="profile-container">
        <div class="avatar-box">
            <img class="avatar" src="https://postimg.cc" alt="Avatar">
        </div>

        <h1>Coffee</h1>
        <div class="status">love website</div>
        
        <div>
            <span class="badge-info"
 🎌Scalvor</span>
            <span class="badge-info">🫦website coding</span>
        </div>

        <a href="https://t.me" target="_blank" class="social-link">
            TELEGRAM PROFILE
        </a>

        <div class="music-player">
            <div class="track-info">
                <div class="track-title">тело (Slowed)</div>
                <div class="track-artist">DJ ZUP RAIii</div>
            </div>
            <audio id="bg-music" src="music.mp3" loop></audio>
            <button class="play-btn" id="play-button" onclick="toggleMusic()">▶</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const numberOfParticles = 40;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 1;
                this.speedY = Math.random() * 1.2 + 0.4;
                this.speedX = Math.random() * 0.8 - 0.4;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        function revealProfile() {
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
                document.getElementById('body-wrapper').classList.add('loaded');
                toggleMusic();
            }, 600);
        }

        const audio = document.getElementById('bg-music');
        const playBtn = document.getElementById('play-button');

        function toggleMusic() {
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.innerText = '';
                }).catch(e => {
                    playBtn.innerText = '▶';
                });
            } else {
                audio.pause();
playBtn.innerText = '👁️';
}
}
